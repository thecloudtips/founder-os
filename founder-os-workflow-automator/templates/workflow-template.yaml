# Workflow Automator Template
# Copy this file to workflows/ and customize for your automation.
#
# Usage: /workflow:run my-workflow
# Docs:  Read skills/workflow-design/SKILL.md for full schema reference.

workflow:
  name: "my-workflow"                    # TODO: Unique kebab-case identifier
  description: "What this workflow does" # TODO: Human-readable purpose
  version: "1.0.0"                       # Semantic version for change tracking
  tags:                                  # Optional: categorization labels
    - "daily"                            # TODO: Add relevant tags

# Schedule (optional): auto-run this workflow on a cron schedule
schedule:
  enabled: false                         # Set true to activate scheduling
  cron: "0 9 * * 1-5"                   # TODO: Cron expression (weekdays 9 AM)
  timezone: "America/New_York"           # TODO: IANA timezone identifier

# Defaults: applied to all steps unless overridden per-step
defaults:
  stop_on_error: true                    # Halt workflow on first step failure
  timeout_seconds: 300                   # Max seconds per step (5 min default)
  output_format: "chat"                  # Output: chat | notion | both

# Steps: the workflow execution pipeline
# Each step runs a Founder OS plugin command with optional arguments.
# Steps execute in dependency order (DAG). Steps with no depends_on run first.
steps:
  - id: "step-1"                         # TODO: Unique step identifier
    name: "First Step"                   # TODO: Human-readable label
    command: "/plugin:command"           # TODO: Plugin slash command to run
    args:                                # Optional: command arguments
      flag1: "value1"                    # TODO: Replace with real args
    depends_on: []                       # No dependencies = runs first
    continue_on_error: false             # Override: true to skip failures
    output_as: "step1_result"            # Store output in context as this key
    timeout_seconds: 120                 # Override default timeout
    condition: ""                        # Optional: run only if expression is true

  - id: "step-2"                         # TODO: Unique step identifier
    name: "Second Step"                  # TODO: Human-readable label
    command: "/plugin:command"           # TODO: Plugin slash command to run
    args:
      input: "{{context.step1_result}}"  # Reference output from step-1
    depends_on:                          # Runs after step-1 completes
      - "step-1"
    continue_on_error: false
    output_as: "step2_result"
    timeout_seconds: 300
    condition: ""
