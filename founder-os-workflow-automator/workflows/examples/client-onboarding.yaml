workflow:
  name: "client-onboarding"
  description: "New client onboarding: load context, sync CRM, run health check, and generate welcome briefing"
  version: "1.0.0"
  tags: ["client", "onboarding", "crm"]

schedule:
  enabled: false

defaults:
  stop_on_error: true
  timeout_seconds: 300
  output_format: "both"

steps:
  - id: "load-context"
    name: "Load Client Context"
    command: "/client:load"
    args:
      refresh: "true"
    depends_on: []
    output_as: "client_context"
    timeout_seconds: 120

  - id: "sync-email"
    name: "Sync Email History"
    command: "/crm:sync-email"
    args:
      since: "30d"
    depends_on: []
    output_as: "email_sync"
    timeout_seconds: 120

  - id: "sync-meetings"
    name: "Sync Meeting History"
    command: "/crm:sync-meeting"
    args:
      since: "30d"
    depends_on: []
    output_as: "meeting_sync"
    timeout_seconds: 120

  - id: "health-check"
    name: "Run Client Health Assessment"
    command: "/client:health-report"
    args: {}
    depends_on:
      - "load-context"
      - "sync-email"
      - "sync-meetings"
    output_as: "health_report"
    timeout_seconds: 180

  - id: "generate-proposal"
    name: "Prepare Welcome Proposal"
    command: "/proposal:create"
    args:
      output: "{{context.client_context}}"
    depends_on:
      - "health-check"
    output_as: "proposal"
    timeout_seconds: 300
    condition: "context.health_report"
