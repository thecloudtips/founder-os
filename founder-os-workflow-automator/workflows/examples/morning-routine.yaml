workflow:
  name: "morning-routine"
  description: "Weekday morning check-in: email triage, calendar review, briefing generation, and Slack catch-up"
  version: "1.0.0"
  tags: ["daily", "morning", "productivity"]

schedule:
  enabled: true
  cron: "0 9 * * 1-5"
  timezone: "America/New_York"

defaults:
  stop_on_error: false
  timeout_seconds: 180
  output_format: "chat"

steps:
  - id: "check-email"
    name: "Triage Inbox"
    command: "/inbox:triage"
    args: {}
    depends_on: []
    output_as: "email_summary"
    timeout_seconds: 120

  - id: "review-calendar"
    name: "Review Today's Calendar"
    command: "/meeting:prep-today"
    args:
      skip-internal: "true"
    depends_on: []
    output_as: "calendar_summary"
    timeout_seconds: 120

  - id: "generate-briefing"
    name: "Generate Morning Briefing"
    command: "/morning:sync"
    args:
      since: "12h"
      output: "chat"
    depends_on:
      - "check-email"
      - "review-calendar"
    output_as: "briefing"
    timeout_seconds: 180

  - id: "slack-catchup"
    name: "Catch Up on Slack"
    command: "/slack:catch-up"
    args:
      since: "12h"
    depends_on: []
    continue_on_error: true
    output_as: "slack_summary"
    timeout_seconds: 60
